<!-- templates/replan.html -->
{% extends "base.html" %}

{% block title %}TripForge - Resolve Scheduling Disruptions{% endblock %}

{% block content %}
<div class="max-w-md mx-auto py-12">
    <div class="text-center mb-8">
        <div class="text-5xl mb-4">⚡</div>
        <h1 class="text-3xl font-extrabold text-white">Resolve Travel Disruption</h1>
        <p class="text-sm text-gray-400 mt-2">Describe the strike, closure, or schedule disruption to trigger our agentic routing mitigation logic.</p>
    </div>

    <!-- Replan Form Card -->
    <div class="glass-card rounded-3xl p-6 border border-gray-800 shadow-xl">
        <form action="{{ url_for('replan') }}" method="POST" class="space-y-4">
            <div>
                <label for="disruption" class="block text-sm font-medium text-gray-300 mb-1">Disruption Event Details *</label>
                <textarea id="disruption" name="disruption" required rows="4"
                          placeholder="e.g. Workers union strike forces closure of all major museums on Day 1"
                          class="w-full bg-gray-950/60 border border-gray-800 rounded-xl px-3 py-2.5 text-white text-sm focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-colors"></textarea>
            </div>

            <div class="pt-2">
                <button type="submit" class="w-full py-4 text-center block rounded-xl font-bold text-white gradient-btn text-xs">
                    ⚡ Resolve via DisruptionAgent
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
